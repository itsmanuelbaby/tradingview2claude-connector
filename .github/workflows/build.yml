name: Build Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows .exe
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download bundled Node + npm completo
        run: |
          mkdir -p bundled-node

          # ── arm64 ──────────────────────────────────────────────
          curl -L https://nodejs.org/dist/v20.19.1/node-v20.19.1-darwin-arm64.tar.gz -o /tmp/node-arm64.tar.gz
          tar -xzf /tmp/node-arm64.tar.gz -C /tmp
          cp /tmp/node-v20.19.1-darwin-arm64/bin/node bundled-node/node-arm64
          chmod +x bundled-node/node-arm64

          # ── x64 ────────────────────────────────────────────────
          curl -L https://nodejs.org/dist/v20.19.1/node-v20.19.1-darwin-x64.tar.gz -o /tmp/node-x64.tar.gz
          tar -xzf /tmp/node-x64.tar.gz -C /tmp
          cp /tmp/node-v20.19.1-darwin-x64/bin/node bundled-node/node-x64
          chmod +x bundled-node/node-x64

          # ── npm completo (da arm64, è puro JS quindi uguale per entrambe le arch) ──
          cp -r /tmp/node-v20.19.1-darwin-arm64/lib/node_modules/npm bundled-node/npm_modules

          echo "bundled-node contents:"
          ls -la bundled-node/
          echo "npm_modules bin:"
          ls bundled-node/npm_modules/bin/

      - name: Setup bundled-mcp
        run: |
          git clone https://github.com/tradesdontlie/tradingview-mcp bundled-mcp
          cd bundled-mcp && npm install

      - name: Install dependencies
        run: npm install

      - name: Build Mac .dmg
        run: npm run dist-mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: installer-mac
          path: dist/*.dmg
